<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0d1b33"/>
      <stop offset="100%" stop-color="#102a4c"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0969da"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#edge)"/>

  <!-- wordmark -->
  <g transform="translate(88, 118)">
    <path d="M0 34 L34 0 L68 34 L34 68 Z" fill="#0969da"/>
    <text x="92" y="52" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Valem</text>
  </g>

  <text x="88" y="252" font-size="34" font-weight="600" fill="#c9d7ee">
    A deterministic, reactive computation runtime
  </text>
  <text x="88" y="298" font-size="34" font-weight="400" fill="#8aa3c4">
    for AI-generated structured data models
  </text>

  <!-- code card: the whole pitch in four lines -->
  <g transform="translate(88, 348)">
    <rect width="1024" height="196" rx="14" fill="#0a1526" stroke="#20304d" stroke-width="1.5"/>
    <g font-family="Consolas, SFMono-Regular, Menlo, monospace" font-size="25">
      <text x="34" y="54" fill="#6f89ab">derivations:</text>
      <text x="212" y="54" fill="#d9e4f5">[{ "path": "$.total", "expr": "subtotal + tax" }]</text>

      <text x="34" y="112" fill="#6f89ab">mutate</text>
      <text x="130" y="112" fill="#d9e4f5">{ "$.subtotal": 100, "$.tax": 8 }</text>

      <text x="34" y="162" fill="#6f89ab">state</text>
      <text x="130" y="162" fill="#d9e4f5">{ subtotal: 100, tax: 8,</text>
      <text x="470" y="162" fill="#3fb950" font-weight="700">total: 108</text>
      <text x="622" y="162" fill="#d9e4f5">}</text>
      <text x="660" y="162" fill="#6f89ab" font-size="21">← derived, not written</text>
    </g>
  </g>

  <text x="88" y="590" font-size="23" fill="#7f97b8">
    vlad-public-code.github.io/org.json-kula.valem
  </text>
  <text x="1112" y="590" font-size="23" fill="#7f97b8" text-anchor="end">Apache-2.0 · Java 21</text>
</svg>
