title: Valem
description: >-
  Deterministic reactive computation runtime for AI-generated structured data
  models — a spreadsheet-like computation model for JSON-based agent systems.

# Published as a GitHub project page:
# https://vlad-public-code.github.io/org.json-kula.valem/
url: https://vlad-public-code.github.io
baseurl: /org.json-kula.valem

theme: just-the-docs

plugins:
  # sitemap.xml for Search Console; relative .md links (used throughout docs/) become page links.
  - jekyll-sitemap
  - jekyll-relative-links
  # Serves the pre-restructure URLs (/guides/*, /architecture/*, /model-spec.html, ...) from the
  # `redirect_from:` front matter on the pages that replaced them.
  - jekyll-redirect-from
  # Supplies page.last_modified_date (from git) for the footer stamp.
  - jekyll-last-modified-at

relative_links:
  enabled: true
  collections: false

# --- Project-wide links (referenced from pages as {{ site.<name> }}) ---------
gh_repo: https://github.com/vlad-public-code/org.json-kula.valem
# The hosted public sandbox on Render.
sandbox_url: https://valem.onrender.com

# --- just-the-docs options ---------------------------------------------------
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# Default scheme. `_includes/head_custom.html` switches to `dark` when the visitor's OS
# prefers it (or when they've used the theme toggle), so this is the light-mode baseline.
color_scheme: light

# The docs are mostly curl / mvn / JSON blocks — give every fence a copy button.
enable_copy_code_button: true

search:
  # Index deeply enough that a reader searching for a `valem.*` property or a component
  # `type` lands on the exact heading rather than the top of a long reference page.
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/\-_,:;$.]+/
  rel_url: true
  button: false

# "Edit this page on GitHub" link on every page.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: https://github.com/vlad-public-code/org.json-kula.valem
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: edit

# Render ```mermaid fences (loaded from jsDelivr by the theme).
mermaid:
  version: "10.9.1"

# Callout boxes used with {: .note } / {: .tip } / {: .warning } in the pages.
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: red

# "Page last modified" in the footer, from git history via jekyll-last-modified-at.
# Needs the Pages workflow to check out full history (fetch-depth: 0); without it the
# plugin falls back to the file mtime rather than failing the build.
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

aux_links:
  "GitHub":
    - https://github.com/vlad-public-code/org.json-kula.valem
  "Live sandbox":
    - https://valem.onrender.com
aux_links_new_tab: true

footer_content: >-
  Valem — Apache-2.0. Built by
  <a href="https://github.com/vlad-public-code">vlad-public-code</a>.

# Every page defaults to the theme layout, so pages only declare title + nav_order.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# The Search Console verification file is a raw asset — don't let Jekyll process it.
include:
  - googlecbade7c0be249d3a.html

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
