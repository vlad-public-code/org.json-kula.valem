# valem-api's default CSP (default-src 'none') is correct for the headless JSON API but blocks
# valem-web's own bundled SPA (its script/stylesheet/WebSocket loads are same-origin, not API
# JSON responses) — see SecurityConfig's Javadoc.
valem.security.csp=default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; object-src 'none'
